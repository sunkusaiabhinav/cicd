# =============================================================
# FILE: sonar-project.properties
# PURPOSE: Configuration for SonarCloud code quality analysis.
#
# WHAT IS SONARQUBE?
#   SonarQube is a self-hosted code quality and security analysis tool.
#   It scans your Python code for:
#     - Bugs and code smells
#     - Security vulnerabilities and hotspots
#     - Code duplications
#     - Test coverage gaps
#
# HOW IT WORKS IN CI:
#   The SonarQube GitHub Action reads this file, runs analysis on your
#   code, and publishes results to your SonarQube server dashboard.
#
# SETUP REQUIRED:
#   1. Install and run SonarQube server (or use Docker: docker run sonarqube)
#   2. Open SonarQube in browser → Login → My Account → Security → Generate Token
#   3. Create a new project in SonarQube and note the project key
#   4. Add SONAR_TOKEN and SONAR_HOST_URL as GitHub Actions secrets
# =============================================================

# Unique identifier for this project on your SonarQube server
# Must match the project key you created in SonarQube UI
sonar.projectKey=sunkusaiabhinav_cicd

# Your SonarQube server URL is provided via SONAR_HOST_URL secret — not needed here

# Human-readable project name shown on the SonarQube dashboard
sonar.projectName=cicd-fastapi-backend

# Project version (optional but useful for tracking quality over time)
sonar.projectVersion=1.0

# -------------------------------------------------------------------
# Source & Test Paths
# -------------------------------------------------------------------
# sonar.sources: directories containing production code to analyze
sonar.sources=app,main.py

# sonar.tests: directories containing test code (analyzed separately)
sonar.tests=tests

# -------------------------------------------------------------------
# Python-Specific Settings
# -------------------------------------------------------------------
# Tell SonarCloud which Python version to use for analysis rules
sonar.python.version=3.11

# Path to the coverage XML report generated by pytest --cov-report=xml
# SonarCloud reads this to display line-by-line coverage on the dashboard
sonar.python.coverage.reportPaths=coverage.xml

# -------------------------------------------------------------------
# Exclusions — files/folders to skip during analysis
# -------------------------------------------------------------------
sonar.exclusions=.venv/**,dist/**,build/**,**/__pycache__/**,*.egg-info/**
