# =============================================================
# FILE: setup.cfg
# PURPOSE: Central configuration for flake8, isort, mypy, pytest, and coverage.
#
# WHY setup.cfg?
#   Instead of having a separate config file for every tool,
#   we put them all here. Each tool has its own [section].
# =============================================================


# -------------------------------------------------------------
# FLAKE8 — Linting & style checks
# Docs: https://flake8.pycqa.org/en/latest/user/configuration.html
# Run: flake8 app/ tests/
# -------------------------------------------------------------
[flake8]
# Black formats to 88 chars; we set the same limit so they don't conflict
max-line-length = 88

# E203: whitespace before ':' (Black adds this in slices — harmless)
# W503: line break before binary operator (conflicts with Black's style)
extend-ignore = E203, W503

# Don't lint these folders
exclude =
    .git,
    __pycache__,
    .venv,
    dist,
    build,
    *.egg-info,
    .mypy_cache


# -------------------------------------------------------------
# ISORT — Import sorter
# Docs: https://pycqa.github.io/isort/docs/configuration/config_files.html
# Run: isort --check-only app/ tests/ main.py
# Fix: isort app/ tests/ main.py
# -------------------------------------------------------------
[isort]
# 'black' profile ensures isort output is compatible with Black's formatting
profile = black
line_length = 88
# Tell isort which packages belong to OUR project (first-party)
known_first_party = app


# -------------------------------------------------------------
# MYPY — Static type checker
# Docs: https://mypy.readthedocs.io/en/stable/config_file.html
# Run: mypy app/
# -------------------------------------------------------------
[mypy]
python_version = 3.11
# warn_return_any: warn if a function returns Any (lose type safety)
warn_return_any = true
# warn_unused_configs: catch typos in mypy config keys
warn_unused_configs = true
# Ignore missing type stubs for third-party libraries (fastapi, pydantic are fine)
ignore_missing_imports = true


# -------------------------------------------------------------
# PYTEST — Test runner configuration
# Docs: https://docs.pytest.org/en/stable/reference/customize.html
# Run: pytest tests/ -v
# -------------------------------------------------------------
[tool:pytest]
# Default test discovery path
testpaths = tests
# Show verbose output by default
addopts = -v


# -------------------------------------------------------------
# COVERAGE — Code coverage settings (used by pytest-cov)
# Run: pytest --cov=app --cov-report=term-missing --cov-report=xml
# -------------------------------------------------------------
[coverage:run]
# Only measure coverage for the 'app' package
source = app
# Exclude files that don't contain business logic
omit =
    tests/*
    */__init__.py

[coverage:report]
# Print lines not covered in terminal output
show_missing = true
# Fail if total coverage drops below 80%
fail_under = 80
