name: Backend CI-CD Automation

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:

# Prevent duplicate workflow runs
concurrency:
  group: backend-pipeline-${{ github.ref }}
  cancel-in-progress: true

# Global environment variables
env:
  PY_VERSION: "3.11"
  DOCKER_REGISTRY: docker.io
  APP_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/cicd

jobs:

  # ============================================================
  # STATIC ANALYSIS + SECURITY
  # ============================================================
  validation:
    name: Static Analysis & Security
    runs-on: ubuntu-latest

    steps:
      # Pull repository code
      - name: Clone Repository
        uses: actions/checkout@v4

      # Install Python
      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      # Install project dependencies
      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Code formatter validation
      - name: Validate Code Formatting
        run: black --check app/ tests/ main.py

      # Import sorting validation
      - name: Validate Import Order
        run: isort --check-only app/ tests/ main.py

      # Linting
      - name: Run Lint Checks
        run: flake8 app/ tests/

      # Type checking
      - name: Execute Type Analysis
        run: mypy app/

      # Security scan
      - name: Run Security Inspection
        run: bandit -r app/ -c .bandit

      # Dependency vulnerability scan
      - name: Audit Python Packages
        run: pip-audit -r requirements.txt

  # ============================================================
  # TRIVY FILESYSTEM SCAN
  # Runs in parallel with validation — scans source code and
  # Python packages for known CVEs BEFORE the Docker build.
  # Results are uploaded to the GitHub Security tab as SARIF.
  # continue-on-error: true means this is informational only.
  # ============================================================
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    # Runs independently — no need to wait for other jobs
    continue-on-error: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      # Trivy scans the checked-out filesystem for:
      #   - Vulnerable Python packages (from requirements.txt)
      #   - Misconfigurations in Dockerfile, YAML files, etc.
      - name: Run Trivy Filesystem Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          # Report format: SARIF integrates with GitHub Security tab
          format: sarif
          output: trivy-fs-results.sarif
          # Only flag MEDIUM, HIGH, CRITICAL vulnerabilities
          severity: MEDIUM,HIGH,CRITICAL
          # Scan Python packages and config files
          scanners: vuln,misconfig

      # Upload SARIF so results appear in GitHub → Security → Code scanning
      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ============================================================
  # TESTING STAGE
  # ============================================================
  testing:
    name: Application Testing
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Run unit tests with coverage
      - name: Execute Pytest Suite
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # Store coverage report — SonarQube job will download this
      - name: Save Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage.xml
          retention-days: 7

  # ============================================================
  # SONARQUBE CODE QUALITY ANALYSIS (Self-Hosted)
  # Runs after testing so it can use the coverage.xml report.
  # Analyzes: bugs, code smells, duplications, security hotspots.
  # continue-on-error: true — won't block Docker build if it fails.
  #
  # SETUP REQUIRED (2 secrets needed):
  #   1. SONAR_TOKEN     → Your SonarQube server: My Account → Security → Generate Token
  #   2. SONAR_HOST_URL  → URL of your SonarQube server e.g. http://your-server:9000
  #
  # HOW TO GET YOUR TOKEN:
  #   1. Open your SonarQube server in a browser
  #   2. Log in → click your avatar (top right) → My Account
  #   3. Go to Security tab → Generate Tokens
  #   4. Give it a name (e.g. github-actions) → Generate → copy the token
  #   5. Add it as SONAR_TOKEN secret in GitHub repo settings
  # ============================================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: testing
    # Won't block the Docker pipeline if SonarQube server is unavailable
    continue-on-error: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          # fetch-depth=0 gives SonarQube full git history for
          # accurate blame annotations and new-code detection
          fetch-depth: 0

      # Download the coverage.xml produced by the testing job
      # SonarQube uses it to display per-line coverage on the dashboard
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-results

      # Official SonarQube scan action — reads sonar-project.properties
      # for project config and connects to your self-hosted SonarQube server
      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          # URL of your self-hosted SonarQube server (e.g. http://your-server:9000)
          # Add this as secret SONAR_HOST_URL in GitHub repo settings
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # Token generated from your SonarQube server
          # Add this as secret SONAR_TOKEN in GitHub repo settings
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================
  # VERIFY REQUIRED SECRETS
  # ============================================================
  verify-docker-config:
    name: Verify Docker Credentials
    runs-on: ubuntu-latest
    needs:
      - validation
      - testing

    outputs:
      docker-ready: ${{ steps.verify.outputs.docker-ready }}

    steps:
      - name: Validate DockerHub Secrets
        id: verify
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "docker-ready=true" >> $GITHUB_OUTPUT
          else
            echo "docker-ready=false" >> $GITHUB_OUTPUT
            echo "Docker credentials missing. Build skipped."
          fi

  # ============================================================
  # DOCKER BUILD + PUSH
  # ============================================================
  containerize:
    name: Docker Build & Publish
    runs-on: ubuntu-latest

    needs:
      - validation
      - testing
      - verify-docker-config

    if: needs.verify-docker-config.outputs.docker-ready == 'true'

    steps:
      # Checkout repository
      - name: Clone Repository
        uses: actions/checkout@v4

      # Enable Buildx
      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Authenticate DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Generate tags automatically
      - name: Prepare Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}

      # Build and optionally push image
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # TRIVY DOCKER IMAGE SCAN
  # Runs after the Docker image is built and pushed.
  # Scans the published image for OS-level and library CVEs.
  # Fails the pipeline if HIGH or CRITICAL vulnerabilities are found.
  # Results also appear in GitHub Security tab.
  # ============================================================
  trivy-image-scan:
    name: Trivy Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: containerize
    # Only run if the Docker build actually happened
    if: needs.containerize.result == 'success'

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      # Pull and scan the Docker image that was just published.
      # Uses the 'stable' tag applied to main branch pushes.
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          # Scans the image that was just pushed to Docker Hub
          image-ref: ${{ env.APP_IMAGE }}:stable
          format: sarif
          output: trivy-image-results.sarif
          # Exit with error code 1 if HIGH or CRITICAL CVEs are found
          severity: HIGH,CRITICAL
          exit-code: "1"

      # Upload results to GitHub Security tab regardless of pass/fail
      - name: Upload Trivy Image Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker-image
