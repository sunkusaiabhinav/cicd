name: Backend CI-CD Automation

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:

# Prevent duplicate workflow runs
concurrency:
  group: backend-pipeline-${{ github.ref }}
  cancel-in-progress: true

# Global environment variables
env:
  PY_VERSION: "3.11"
  DOCKER_REGISTRY: docker.io
  APP_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi-service

jobs:

  # ============================================================
  # STATIC ANALYSIS + SECURITY
  # ============================================================
  validation:
    name: Static Analysis & Security
    runs-on: ubuntu-latest

    steps:
      # Pull repository code
      - name: Clone Repository
        uses: actions/checkout@v4

      # Install Python
      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      # Install project dependencies
      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Code formatter validation
      - name: Validate Code Formatting
        run: black --check app/ tests/ main.py

      # Import sorting validation
      - name: Validate Import Order
        run: isort --check-only app/ tests/ main.py

      # Linting
      - name: Run Lint Checks
        run: flake8 app/ tests/

      # Type checking
      - name: Execute Type Analysis
        run: mypy app/

      # Security scan
      - name: Run Security Inspection
        run: bandit -r app/ -c .bandit

      # Dependency vulnerability scan
      - name: Audit Python Packages
        run: pip-audit -r requirements.txt

  # ============================================================
  # TESTING STAGE
  # ============================================================
  testing:
    name: Application Testing
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Run unit tests with coverage
      - name: Execute Pytest Suite
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # Store coverage report
      - name: Save Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage.xml
          retention-days: 7

  # ============================================================
  # VERIFY REQUIRED SECRETS
  # ============================================================
  verify-docker-config:
    name: Verify Docker Credentials
    runs-on: ubuntu-latest
    needs:
      - validation
      - testing

    outputs:
      docker-ready: ${{ steps.verify.outputs.docker-ready }}

    steps:
      - name: Validate DockerHub Secrets
        id: verify
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "docker-ready=true" >> $GITHUB_OUTPUT
          else
            echo "docker-ready=false" >> $GITHUB_OUTPUT
            echo "Docker credentials missing. Build skipped."
          fi

  # ============================================================
  # DOCKER BUILD + PUSH
  # ============================================================
  containerize:
    name: Docker Build & Publish
    runs-on: ubuntu-latest

    needs:
      - validation
      - testing
      - verify-docker-config

    if: needs.verify-docker-config.outputs.docker-ready == 'true'

    steps:
      # Checkout repository
      - name: Clone Repository
        uses: actions/checkout@v4

      # Enable Buildx
      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Authenticate DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Generate tags automatically
      - name: Prepare Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}

      # Build and optionally push image
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
