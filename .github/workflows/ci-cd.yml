name: Backend CI-CD Automation

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:

# Prevent duplicate workflow runs
concurrency:
  group: backend-pipeline-${{ github.ref }}
  cancel-in-progress: true

# Global permissions required for:
#   security-events: write  → uploading Trivy SARIF results to GitHub Security tab
#   contents: read          → checking out the repository
#   actions: read           → reading workflow metadata
permissions:
  contents: read
  security-events: write
  actions: read

# Global environment variables
env:
  PY_VERSION: "3.11"
  DOCKER_REGISTRY: docker.io
  APP_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/cicd

jobs:

  # ============================================================
  # STEP 1 — STATIC ANALYSIS + SECURITY
  # Runs first. Checks code style, linting, types, and security.
  # ============================================================
  validation:
    name: "Step 1 — Static Analysis & Security"
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Code formatter check
      - name: Validate Code Formatting
        run: black --check app/ tests/ main.py

      # Import order check
      - name: Validate Import Order
        run: isort --check-only app/ tests/ main.py

      # Lint check
      - name: Run Lint Checks
        run: flake8 app/ tests/

      # Type check
      - name: Execute Type Analysis
        run: mypy app/

      # Security scan on source code
      - name: Run Security Inspection
        run: bandit -r app/ -c .bandit

      # Dependency vulnerability audit
      - name: Audit Python Packages
        run: pip-audit -r requirements.txt

  # ============================================================
  # STEP 2 — APPLICATION TESTING
  # Runs after Step 1. Executes all unit and integration tests
  # and generates a coverage report used by SonarCloud.
  # ============================================================
  testing:
    name: "Step 2 — Application Testing"
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          cache: pip

      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Run pytest with coverage — generates coverage.xml for SonarCloud
      - name: Execute Pytest Suite
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # Upload coverage.xml so Step 3 (SonarCloud) can download it
      - name: Save Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage.xml
          retention-days: 7

  # ============================================================
  # STEP 3 — SONARCLOUD CODE QUALITY ANALYSIS
  # Runs after Step 2. Downloads coverage.xml and sends code +
  # coverage data to sonarcloud.io for quality gate analysis.
  #
  # SETUP: Add SONAR_TOKEN secret to GitHub repo settings.
  #   Get it: sonarcloud.io → My Account → Security → Generate Token
  # ============================================================
  sonarcloud:
    name: "Step 3 — SonarCloud Analysis"
    runs-on: ubuntu-latest
    needs: testing
    # Informational — won't block pipeline if SonarCloud is unavailable
    continue-on-error: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          # Full history needed for accurate blame and new-code detection
          fetch-depth: 0

      # Download the coverage.xml from Step 2
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-results

      # Connects to sonarcloud.io automatically — no URL secret needed
      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          # Auto-provided by GitHub — enables PR decoration comments
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # From: sonarcloud.io → My Account → Security → Generate Token
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================
  # STEP 4 — TRIVY FILESYSTEM SCAN
  # Runs after Step 3. Scans source code and Python packages
  # for known CVEs and misconfigurations before Docker build.
  # Results appear in GitHub Security → Code scanning tab.
  # ============================================================
  trivy-fs-scan:
    name: "Step 4 — Trivy Filesystem Scan"
    runs-on: ubuntu-latest
    needs: sonarcloud
    # Informational only — won't block Docker pipeline
    continue-on-error: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      # Scans requirements.txt packages and Dockerfile for vulnerabilities
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          scanners: vuln,misconfig

      # Upload results to GitHub Security tab (requires security-events: write)
      - name: Upload Filesystem Scan Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ============================================================
  # STEP 5 — VERIFY DOCKER CREDENTIALS
  # Runs after Step 4. Checks if DockerHub secrets exist before
  # attempting the Docker build. Outputs docker-ready flag.
  # ============================================================
  verify-docker-config:
    name: "Step 5 — Verify Docker Credentials"
    runs-on: ubuntu-latest
    needs: trivy-fs-scan

    outputs:
      docker-ready: ${{ steps.verify.outputs.docker-ready }}

    steps:
      - name: Validate DockerHub Secrets
        id: verify
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "docker-ready=true" >> $GITHUB_OUTPUT
            echo "✅ Docker credentials found. Build will proceed."
          else
            echo "docker-ready=false" >> $GITHUB_OUTPUT
            echo "⚠️  Docker credentials missing. Build skipped."
          fi

  # ============================================================
  # STEP 6 — DOCKER BUILD & PUSH
  # Runs after Step 5. Builds the Docker image and pushes it to
  # Docker Hub. Only runs if docker-ready=true from Step 5.
  # ============================================================
  containerize:
    name: "Step 6 — Docker Build & Publish"
    runs-on: ubuntu-latest
    needs: verify-docker-config
    if: needs.verify-docker-config.outputs.docker-ready == 'true'

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Auto-generate tags: branch name, commit SHA, and 'stable' for main
      - name: Prepare Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # STEP 7 — TRIVY IMAGE VULNERABILITY SCAN
  # Runs after Step 6. Scans the published Docker image for
  # OS-level and library CVEs. Results go to GitHub Security tab.
  # continue-on-error: true because base OS images often contain
  # known CVEs that can't be fixed by the developer directly.
  # ============================================================
  trivy-image-scan:
    name: "Step 7 — Trivy Image Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: containerize
    if: needs.containerize.result == 'success'
    # Informational — base OS image CVEs should not block releases
    continue-on-error: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      # Scan the 'stable' tagged image just pushed to Docker Hub
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.APP_IMAGE }}:stable
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          # exit-code 0 = report only, won't fail the pipeline
          # Change to "1" if you want HIGH/CRITICAL to fail the build
          exit-code: "0"

      # Upload results to GitHub Security tab
      - name: Upload Image Scan Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker-image
